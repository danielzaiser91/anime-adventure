name: Discord News Notification

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types:
      - completed
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get version and changelog
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Get last commit message for changelog
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" 2>/dev/null || echo "New update deployed")
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

          # Determine event type
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "event_type=release" >> $GITHUB_OUTPUT
            echo "title=🎮 New Release: v$VERSION" >> $GITHUB_OUTPUT
          else
            echo "event_type=deploy" >> $GITHUB_OUTPUT
            echo "title=🚀 New Update Deployed!" >> $GITHUB_OUTPUT
          fi

      - name: Post or edit Discord message
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TITLE="${{ steps.meta.outputs.title }}"
          COMMIT="${{ steps.meta.outputs.commit_msg }}"

          MESSAGES_FILE=".github/discord-messages.json"

          # Look up existing message ID for this version
          EXISTING_MSG_ID=$(jq -r --arg v "$VERSION" '.[$v] // empty' "$MESSAGES_FILE")

          # Build embeds safely via jq (guards against special chars in commit messages)
          EMBEDS=$(jq -n \
            --arg title "$TITLE" \
            --arg commit "$COMMIT" \
            --arg version "v$VERSION" \
            '[{
              "title": $title,
              "description": ("**Chronicles of the Celestial Blade** has been updated!\n\n> " + $commit),
              "url": "https://danielzaiser91.github.io/anime-adventure/",
              "color": 4286489,
              "fields": [
                { "name": "🗡️ Version", "value": $version, "inline": true },
                { "name": "🌐 Play Now", "value": "[Open Game](https://danielzaiser91.github.io/anime-adventure/)", "inline": true }
              ],
              "footer": { "text": "Chronicles of the Celestial Blade" },
              "timestamp": (now | todate)
            }]')

          TMPFILE=$(mktemp)

          if [ -n "$EXISTING_MSG_ID" ]; then
            echo "Version $VERSION already posted (message $EXISTING_MSG_ID) — editing in place."
            jq -n --argjson embeds "$EMBEDS" '{"embeds": $embeds}' > "$TMPFILE"
            curl -s -X PATCH \
                 -H "Content-Type: application/json" \
                 -d "@$TMPFILE" \
                 "$DISCORD_WEBHOOK_URL/messages/$EXISTING_MSG_ID"
          else
            echo "New version $VERSION — posting new message."
            jq -n \
              --arg username "Celestial Blade News" \
              --arg avatar "https://danielzaiser91.github.io/anime-adventure/assets/logo.svg" \
              --argjson embeds "$EMBEDS" \
              '{"username": $username, "avatar_url": $avatar, "embeds": $embeds}' > "$TMPFILE"
            RESPONSE=$(curl -s \
                            -H "Content-Type: application/json" \
                            -d "@$TMPFILE" \
                            "$DISCORD_WEBHOOK_URL?wait=true")
            MSG_ID=$(echo "$RESPONSE" | jq -r '.id // empty')

            if [ -z "$MSG_ID" ]; then
              echo "Warning: could not get message ID from Discord response: $RESPONSE"
              rm "$TMPFILE"
              exit 0
            fi

            # Record version → message ID and commit back
            jq --arg v "$VERSION" --arg id "$MSG_ID" '.[$v] = $id' "$MESSAGES_FILE" > /tmp/discord-messages-new.json
            mv /tmp/discord-messages-new.json "$MESSAGES_FILE"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$MESSAGES_FILE"
            git commit -m "chore: track Discord message ID for v$VERSION [skip ci]"
            git push
          fi

          rm -f "$TMPFILE"
