<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#04080f"/>
      <stop offset="60%" stop-color="#0a1520"/>
      <stop offset="100%" stop-color="#081018"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="25%" r="30%">
      <stop offset="0%" stop-color="#c0d8f0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c0d8f0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#moonGlow)"/>
  <!-- Moon -->
  <circle cx="960" cy="180" r="60" fill="#d0e8ff" opacity="0.5"/>
  <!-- Background trees -->
  <polygon points="100,1080 200,400 300,1080" fill="#0a1a0a" opacity="0.9"/>
  <polygon points="200,1080 320,350 440,1080" fill="#081508" opacity="0.85"/>
  <polygon points="500,1080 620,300 740,1080" fill="#0a1a0a" opacity="0.9"/>
  <polygon points="900,1080 1000,280 1100,1080" fill="#081008" opacity="0.85"/>
  <polygon points="1100,1080 1220,320 1340,1080" fill="#0a1a0a" opacity="0.9"/>
  <polygon points="1400,1080 1520,350 1640,1080" fill="#081508" opacity="0.85"/>
  <polygon points="1600,1080 1720,400 1840,1080" fill="#0a1a0a" opacity="0.9"/>
  <!-- Mid-ground trees (darker, closer) -->
  <polygon points="0,1080 140,500 280,1080" fill="#071307" opacity="0.95"/>
  <polygon points="700,1080 820,420 940,1080" fill="#071307" opacity="0.95"/>
  <polygon points="1300,1080 1420,460 1540,1080" fill="#071307" opacity="0.95"/>
  <polygon points="1650,1080 1780,480 1920,1080" fill="#071307" opacity="0.95"/>
  <!-- Spirit wisps -->
  <circle cx="350" cy="600" r="6" fill="#4169e1" opacity="0.7"/>
  <circle cx="400" cy="580" r="4" fill="#7b2d8b" opacity="0.5"/>
  <circle cx="1100" cy="550" r="5" fill="#4169e1" opacity="0.6"/>
  <circle cx="1200" cy="620" r="4" fill="#00c8a0" opacity="0.5"/>
  <circle cx="700" cy="500" r="5" fill="#7b2d8b" opacity="0.6"/>
  <circle cx="750" cy="530" r="3" fill="#4169e1" opacity="0.5"/>
  <circle cx="1500" cy="580" r="6" fill="#00c8a0" opacity="0.55"/>
  <!-- Fallen log / ground details -->
  <ellipse cx="600" cy="900" rx="200" ry="20" fill="#0d1a0d" opacity="0.8"/>
  <ellipse cx="1400" cy="920" rx="150" ry="18" fill="#0d1a0d" opacity="0.7"/>
  <!-- Ground mist -->
  <ellipse cx="960" cy="1000" rx="900" ry="80" fill="#0d2030" opacity="0.4"/>
  <!-- Stars through canopy -->
  <circle cx="500" cy="100" r="1" fill="white" opacity="0.4"/>
  <circle cx="800" cy="80" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="1200" cy="120" r="1" fill="white" opacity="0.4"/>
  <circle cx="1600" cy="90" r="1.5" fill="white" opacity="0.45"/>
</svg>
