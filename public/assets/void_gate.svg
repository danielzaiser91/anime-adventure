<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020006"/>
      <stop offset="100%" stop-color="#0a0018"/>
    </linearGradient>
    <radialGradient id="voidPulse" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7b2d8b" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#4a0070" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7b2d8b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="innerVoid" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#000008"/>
      <stop offset="100%" stop-color="#1a0030"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#voidPulse)"/>
  <!-- Gate frame pillars -->
  <rect x="650" y="100" width="100" height="900" fill="#0d0020" opacity="0.95"/>
  <rect x="1170" y="100" width="100" height="900" fill="#0d0020" opacity="0.95"/>
  <!-- Gate arch -->
  <path d="M650,300 Q960,50 1270,300" fill="none" stroke="#7b2d8b" stroke-width="8" opacity="0.9"/>
  <path d="M650,300 Q960,80 1270,300" fill="none" stroke="#4169e1" stroke-width="3" opacity="0.6"/>
  <!-- Void portal within gate -->
  <ellipse cx="960" cy="540" rx="280" ry="360" fill="url(#innerVoid)"/>
  <ellipse cx="960" cy="540" rx="270" ry="350" fill="#000010" opacity="0.9"/>
  <!-- Energy rings -->
  <ellipse cx="960" cy="540" rx="300" ry="380" fill="none" stroke="#7b2d8b" stroke-width="4" opacity="0.7"/>
  <ellipse cx="960" cy="540" rx="320" ry="400" fill="none" stroke="#4169e1" stroke-width="2" opacity="0.4"/>
  <ellipse cx="960" cy="540" rx="340" ry="420" fill="none" stroke="#7b2d8b" stroke-width="1" opacity="0.25"/>
  <!-- Rune markings on pillars -->
  <rect x="680" y="300" width="40" height="4" fill="#7b2d8b" opacity="0.9"/>
  <rect x="680" y="340" width="30" height="4" fill="#4169e1" opacity="0.8"/>
  <rect x="680" y="380" width="40" height="4" fill="#7b2d8b" opacity="0.7"/>
  <rect x="680" y="420" width="25" height="4" fill="#4169e1" opacity="0.6"/>
  <rect x="1200" y="300" width="40" height="4" fill="#7b2d8b" opacity="0.9"/>
  <rect x="1200" y="340" width="30" height="4" fill="#4169e1" opacity="0.8"/>
  <rect x="1200" y="380" width="40" height="4" fill="#7b2d8b" opacity="0.7"/>
  <!-- Dark void particles -->
  <circle cx="800" cy="400" r="3" fill="#7b2d8b" opacity="0.6"/>
  <circle cx="900" cy="350" r="2" fill="#4169e1" opacity="0.5"/>
  <circle cx="1050" cy="420" r="3" fill="#7b2d8b" opacity="0.55"/>
  <circle cx="1100" cy="370" r="2" fill="#4169e1" opacity="0.5"/>
  <!-- Ground -->
  <rect x="0" y="900" width="1920" height="180" fill="#050010" opacity="0.95"/>
  <ellipse cx="960" cy="900" rx="400" ry="30" fill="#7b2d8b" opacity="0.15"/>
</svg>
